<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Online</h1>
    </header>
    <main>
      <section>
        <form action="" method="post">
          
          <fieldset>
            <legend>Dados Pessoais</legend>

            <div class="form-group">
              <label for="name">Nome:</label>
              <input type="text" name="userName" id="name" placeholder="Digite seu nome" required />
            </div>

            <div class="form-group">
              <label for="birthDate">Data de Nascimento:</label>
              <input type="date" name="userBirthDate" id="birthDate" />
            </div>

            <div class="form-group">
              <label for="age">Idade:</label>
              <input type="number" name="userAge" id="age" min="12" max="100" placeholder="Digite sua idade" required />
            </div>

            <div class="form-group">
              <label for="email">E-mail:</label>
              <input type="email" name="userEmail" id="email" placeholder="exemplo@email.com" required />
            </div>

            <div class="form-group">
              <label for="phoneNumber">Telefone:</label>
              <input type="tel" name="userPhoneNumber" id="phoneNumber" pattern="\(\d{2}\) \d{5}-\d{4}" placeholder="(99) 99999-9999" title="Digite um número de telefone no formato (99) 99999-9999" />
            </div>

            <div class="form-group">
              <label for="image">Upload de Foto:</label>
              <input type="file" accept="image/*" name="userImage" id="image" />
            </div>
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <div class="form-group">
              <p>Gênero:</p>
              <div class="radio-group">
                <input type="radio" name="userGender" id="masc" value="Masculino" />
                <label for="masc">Masculino</label>

                <input type="radio" name="userGender" id="fem" value="Feminino" />
                <label for="fem">Feminino</label>

                <input type="radio" name="userGender" id="notInformed" value="notInformed" />
                <label for="notInformed">Prefiro não informar</label>
              </div>
            </div>

            <div class="form-group">
              <label for="maritalStatus">Estado Civil:</label>
              <select name="userMaritalStatus" id="maritalStatus" required>
                <option value="notInformed" disabled selected>Selecione</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="uniaoEstavel">União Estável</option>
              </select>
            </div>

            <div class="form-group">
              <label for="state">Estado:</label>
              <select name="userState" id="state" required>
                <option value="notInformed" disabled selected>Selecione</option>
                <option value="acre">Acre</option>
                <option value="saoPaulo">São Paulo</option>
              </select>
            </div>

            <div class="form-group">
              <label for="city">Cidade:</label>
              <input type="text" name="userCity" id="city" placeholder="Digite o nome da sua cidade" />
            </div>
          </fieldset>

          <fieldset>
            <legend>Hábitos</legend>

            <div class="form-group">
              <p>Redes Sociais:</p>
              <div class="checkbox-item">
                <input type="checkbox" name="social" id="facebook" value="facebook" />
                <label for="facebook">Facebook</label>
              </div>

              <div class="checkbox-item">
                <input type="checkbox" name="social" id="instagram" value="instagram" />
                <label for="instagram">Instagram</label>
              </div>

              <div class="checkbox-item">
                <input type="checkbox" name="social" id="twitter" value="twitter" />
                <label for="twitter">Twitter</label>
              </div>

              <div class="checkbox-item">
                <input type="checkbox" name="social" id="linkedin" value="linkedin" />
                <label for="linkedin">LinkedIn</label>
              </div>
            </div>
          </fieldset>

          <div class="form-actions">
            <button type="submit">Enviar Pesquisa</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
