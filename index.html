<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Online</h1>
    </header>
    <main>
      <section>
        <form action="" method="post">
          <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="userName">Nome:</label>
            <input
              type="text"
              name="userName"
              id="userName"
              placeholder="Digite seu nome"
              required
            />

            <label for="birthDate">Data de Nascimento:</label>
            <input
              type="date" 
              name="birthDate" 
              id="birthDate" />

            <label for="userAge">Idade:</label>
            <input
              type="number"
              name="userAge"
              id="userAge"
              min="12"
              max="100"
              placeholder="Digite sua idade"
              required
            />

            <label for="userEmail">E-mail:</label>
            <input
              type="email"
              name="userEmail"
              id="userEmail"
              placeholder="exemplo@email.com"
              required
            />

            <label for="userPhone">Telefone:</label>
            <input
              type="tel"
              name="userPhone"
              id="userPhone"
              pattern="\(\d{2}\) \d{5}-\d{4}"
              placeholder="(99) 99999-9999"
              title="Digite um número de telefone no formato (99) 99999-9999"
            />

            <label for="userImage">Upload de Foto:</label>
            <input
              type="file"
              accept="image/*"
              name="userImage"
              id="userImage"
            />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input
              type="radio"
              name="userGender"
              id="genderMale"
              value="Masculino"
            />
            <label for="genderMale">Masculino</label>

            <input
              type="radio"
              name="userGender"
              id="genderFemale"
              value="Feminino"
            />
            <label for="genderFemale">Feminino</label>

            <input
              type="radio"
              name="userGender"
              id="genderNotInformed"
              value="notInformed"
            />
            <label for="genderNotInformed">Prefiro não informar</label>

            <label for="maritalStatus">Estado Civil:</label>
            <select name="maritalStatus" id="maritalStatus" required>
                <option value="notInformed" disabled selected>Selecione</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="uniaoEstavel">União Estável</option>
            </select>                   

          </fieldset>
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
  </body>
</html>
