<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Online</h1>
    </header>
    <main>
      <section>
        <form action="" method="post">
          <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="userName">Nome:</label>
            <input
              type="text"
              name="userName"
              id="userName"
              placeholder="Digite seu nome"
              required
            />

            <label for="birthDate">Data de Nascimento:</label>
            <input
              type="date" 
              name="birthDate" 
              id="birthDate" />

            <label for="userAge">Idade:</label>
            <input
              type="number"
              name="userAge"
              id="userAge"
              min="12"
              max="100"
              placeholder="Digite sua idade"
              required
            />

            <label for="userEmail">E-mail:</label>
            <input
              type="email"
              name="userEmail"
              id="userEmail"
              placeholder="exemplo@email.com"
              required
            />

            <label for="userPhone">Telefone:</label>
            <input
              type="tel"
              name="userPhone"
              id="userPhone"
              pattern="\(\d{2}\) \d{5}-\d{4}"
              placeholder="(99) 99999-9999"
              title="Digite um número de telefone no formato (99) 99999-9999"
            />

            <label for="userImage">Upload de Foto:</label>
            <input
              type="file"
              accept="image/*"
              name="userImage"
              id="userImage"
            />
          </fieldset>

          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input
              type="radio"
              name="userGender"
              id="genderMale"
              value="Masculino"
            />
            <label for="genderMale">Masculino</label>

            <input
              type="radio"
              name="userGender"
              id="genderFemale"
              value="Feminino"
            />
            <label for="genderFemale">Feminino</label>

            <input
              type="radio"
              name="userGender"
              id="genderNotInformed"
              value="notInformed"
            />
            <label for="genderNotInformed">Prefiro não informar</label>

            <label for="maritalStatus">Estado Civil:</label>
            <select name="maritalStatus" id="maritalStatus" required>
                <option value="notInformed" disabled selected>Selecione</option>
                <option value="solteiro">Solteiro(a)</option>
                <option value="casado">Casado(a)</option>
                <option value="divorciado">Divorciado(a)</option>
                <option value="uniaoEstavel">União Estável</option>
            </select>    
            
            
            <label for="userState">Estado:</label>
            <select name="userState" id="userState">
                <option value="notInformed" disabled
                selected>Selecione</option>
                <option value="Acre">Acre</option>
                <option value="Alagoas">Alagoas</option>
                <option value="Amapá">Amapá</option>
                <option value="Amazonas">Amazonas</option>
                <option value="Bahia">Bahia</option>
                <option value="Ceará">Ceará</option>
                <option value="Distrito Federal">Distrito Federal</option>
                <option value="Espirito Santo">Espirito Santo</option>
                <option value="Goiás">Goiás</option>
                <option value="Maranhão">Maranhão</option>
                <option value="Mato Grosso do Sul">Mato Grosso do Sul</option>
                <option value="Mato Grosso">Mato Grosso</option>
                <option value="Minas Gerais">Minas Gerais</option>
                <option value="Pará">Pará</option>
                <option value="Paraíba">Paraíba</option>
                <option value="Paraná">Paraná</option>
                <option value="Pernambuco">Pernambuco</option>
                <option value="Piauí">Piauí</option>
                <option value="Rio de Janeiro">Rio de Janeiro</option>
                <option value="Rio Grande do Norte">Rio Grande do Norte</option>
                <option value="Rio Grande do Sul">Rio Grande do Sul</option>
                <option value="Rondônia">Rondônia</option>
                <option value="Roraima">Roraima</option>
                <option value="Santa Catarina">Santa Catarina</option>
                <option value="São Paulo">São Paulo</option>
                <option value="Sergipe">Sergipe</option>
                <option value="Tocantins">Tocantins</option>
            </select> 

            <label for="userCity">Cidade:</label>
            <input
              type="text"
              name="userCity"
              id="userCity"
              placeholder="Digite o nome da sua cidade"
            />

          </fieldset>
          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>
  </body>
</html>
